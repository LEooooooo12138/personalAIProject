<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Agent — Web Chat Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .hero { text-align: center; margin-bottom: 40px; }
  .hero h1 { font-size: 24px; font-weight: 600; color: #f0f6fc; margin-bottom: 8px; }
  .hero p { font-size: 14px; color: #8b949e; }
  .status-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; margin-top: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: #3fb950; }
  .dot.err { background: #f85149; }
  .info { margin-top: 32px; font-size: 12px; color: #484f58; text-align: center; }
  .info code { background: #161b22; padding: 2px 6px; border-radius: 3px; }
</style>
</head>
<body>

<div class="hero">
  <h1>Go Agent</h1>
  <p>Personal AI assistant — try the chat widget at the bottom right</p>
  <div class="status-row">
    <span class="dot" id="agent-dot"></span>
    <span id="agent-status">checking...</span>
  </div>
</div>

<div class="info">
  <p>Endpoint: <code id="ep"></code></p>
</div>

<script>
  // Check agent health.
  var base = location.protocol + "//" + location.host;
  document.getElementById("ep").textContent = base + "/channels/webchat/ws";

  fetch(base + "/health")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      document.getElementById("agent-dot").className = "dot ok";
      document.getElementById("agent-status").textContent = d.status;
    })
    .catch(function() {
      document.getElementById("agent-dot").className = "dot err";
      document.getElementById("agent-status").textContent = "down";
    });
</script>

<script src="/chat/chat-widget.js"></script>
<script>
  ChatWidget.init({
    endpoint: (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/channels/webchat/ws",
    theme: "dark",
    greeting: "你好！我是你的 AI 助手，有什么可以帮你的？"
  });
</script>

</body>
</html>
