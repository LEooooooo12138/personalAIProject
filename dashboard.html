<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #f0f6fc; }
  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 13px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .status-row { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.ok { background: #3fb950; }
  .dot.err { background: #f85149; }
  textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; padding: 10px; font-family: monospace; font-size: 13px; resize: vertical; min-height: 60px; }
  button { background: #238636; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
  button:hover { background: #2ea043; }
  .output { background: #0d1117; border: 1px solid #30363d; border-radius: 4px; padding: 12px; margin-top: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; color: #7ee787; }
  .key-hint { font-size: 12px; color: #8b949e; margin-top: 4px; }
</style>
</head>
<body>

<h1>Go Agent ::8080</h1>

<div class="panel">
  <h2>Health</h2>
  <div class="status-row">
    <div class="dot" id="health-dot"></div>
    <span id="health-text">checking...</span>
  </div>
</div>

<div class="panel">
  <h2>Chat Completion</h2>
  <textarea id="chat-input"  placeholder='{ "model":"gemma4:12b", "messages":[{"role":"user","content":"你好"}] }'>{"model":"gemma4:12b","messages":[{"role":"user","content":"你好"}]}</textarea>
  <div class="key-hint">Auth: Bearer my_local_api_key</div>
  <button onclick="sendChat()" style="margin-top:8px">Send</button>
  <div class="output" id="chat-output"></div>
</div>

<div class="panel">
  <h2>Models</h2>
  <button onclick="listModels()">List Models</button>
  <div class="output" id="models-output"></div>
</div>

<script>
const BASE = 'http://localhost:8080';
const KEY = 'my_local_api_key';

async function checkHealth() {
  try {
    const r = await fetch(BASE + '/health');
    const d = await r.json();
    document.getElementById('health-dot').className = 'dot ok';
    document.getElementById('health-text').textContent = d.status;
  } catch(e) {
    document.getElementById('health-dot').className = 'dot err';
    document.getElementById('health-text').textContent = 'down';
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input').value;
  const out = document.getElementById('chat-output');
  out.textContent = 'sending...';
  try {
    const r = await fetch(BASE + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
      body: input
    });
    const d = await r.json();
    out.textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    out.textContent = 'Error: ' + e;
  }
}

async function listModels() {
  const out = document.getElementById('models-output');
  try {
    const r = await fetch(BASE + '/v1/models', {
      headers: { 'Authorization': 'Bearer ' + KEY }
    });
    const d = await r.json();
    out.textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    out.textContent = 'Error: ' + e;
  }
}

checkHealth();
</script>
</body>
</html>
